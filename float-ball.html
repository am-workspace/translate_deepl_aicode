<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻译悬浮球</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: pointer;
    }

    .float-ball {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
      transition: all 0.2s ease;
      opacity: 0.6;
    }

    .float-ball:hover {
      opacity: 1;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.7);
    }

    .icon-container {
      position: relative;
      width: 36px;
      height: 36px;
    }

    /* 文字图标 - 类似有道翻译风格 */
    .text-icon {
      position: absolute;
      font-family: 'Arial', sans-serif;
      font-weight: bold;
      color: white;
      font-size: 18px;
    }

    .text-zh {
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
    }

    .text-en {
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
    }

    /* 交换箭头 */
    .arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
    }

    .arrow::before {
      content: '⇄';
      color: white;
      font-size: 16px;
      position: absolute;
      left: -8px;
      top: -8px;
    }
  </style>
</head>
<body>
  <div class="float-ball" id="floatBall">
    <div class="icon-container">
      <span class="text-icon text-zh">中</span>
      <span class="text-icon text-en">En</span>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const floatBall = document.getElementById('floatBall');

    // 拖拽功能
    let isDragging = false;
    let startX, startY;
    let initialX, initialY;

    floatBall.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.screenX;
      startY = e.screenY;
      
      // 获取当前窗口位置
      const bounds = ipcRenderer.sendSync('get-window-bounds');
      initialX = bounds.x;
      initialY = bounds.y;
      
      floatBall.style.cursor = 'grabbing';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      
      const deltaX = e.screenX - startX;
      const deltaY = e.screenY - startY;
      
      ipcRenderer.send('move-window', {
        x: initialX + deltaX,
        y: initialY + deltaY
      });
    });

    document.addEventListener('mouseup', (e) => {
      if (!isDragging) return;
      
      isDragging = false;
      floatBall.style.cursor = 'pointer';
      
      // 检查是否是点击（不是拖拽），且是左键
      const deltaX = e.screenX - startX;
      const deltaY = e.screenY - startY;
      if (Math.abs(deltaX) < 5 && Math.abs(deltaY) < 5 && e.button === 0) {
        // 打开主窗口（左键点击）
        ipcRenderer.send('open-main-window');
      }
    });

    // 右键菜单事件
    floatBall.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      ipcRenderer.send('show-context-menu');
    });
  </script>
</body>
</html>
